
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Loja</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>📎 Minha Loja</h1>
    <div class="carrinho">
    🛒 Carrinho: <span id="itens">0</span> itens - R$ <span id="valor">0.00</span>
    </div>
  </header>

  <main class="produtos">
    
    <div class="produto">
      <h2>Camiseta</h2>
      <p>R$ 50,00</p>
      <button onclick="adicionar('Camiseta', 50)">Adicionar</button>
      <img src="/img/camisa.jpg.webp">
    </div>

    <div class="produto">
      <h2>Tênis</h2>
      <p>R$ 200,43</p>
      <button onclick="adicionar('produto', 200.43)">Adicionar ao carrinho</button>
    </div>

    <div class="produto">
      <h2>Boné</h2>
      <p>R$ 30,98</p>
      <button onclick="adicionar('produto', 30.98)">Adicionar ao carrinho</button>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
